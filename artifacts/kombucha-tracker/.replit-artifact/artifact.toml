kind = "web"
previewPath = "/"
title = "Kombucha Tracker"
version = "1.0.0"
id = "artifacts/kombucha-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19317

[services.development]
run = "pnpm --filter @workspace/kombucha-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kombucha-tracker", "run", "build" ]
publicDir = "artifacts/kombucha-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19317"
BASE_PATH = "/"
