openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kombucha Tracker API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile operations
  - name: batches
    description: Fermentation batch operations
  - name: logs
    description: Daily log operations
  - name: photos
    description: Photo management operations
  - name: ai
    description: AI analysis and chat operations
  - name: storage
    description: Object storage operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile / complete onboarding
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized

  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      summary: List all fermentation batches for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Batch"
        "401":
          description: Unauthorized
    post:
      operationId: createBatch
      tags: [batches]
      summary: Create a new fermentation batch
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchBody"
      responses:
        "201":
          description: Created batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "401":
          description: Unauthorized

  /batches/{batchId}:
    get:
      operationId: getBatch
      tags: [batches]
      summary: Get a single batch by ID
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    put:
      operationId: updateBatch
      tags: [batches]
      summary: Update a batch (e.g., mark F1 complete)
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatchBody"
      responses:
        "200":
          description: Updated batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteBatch
      tags: [batches]
      summary: Delete a batch
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /batches/{batchId}/logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List daily logs for a batch
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Log"
        "401":
          description: Unauthorized
        "404":
          description: Batch not found
    post:
      operationId: createLog
      tags: [logs]
      summary: Create a daily log entry for a batch
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLogBody"
      responses:
        "201":
          description: Created log with AI tip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Log"
        "401":
          description: Unauthorized

  /batches/{batchId}/logs/{logId}:
    get:
      operationId: getLog
      tags: [logs]
      summary: Get a single log entry
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Log"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    put:
      operationId: updateLog
      tags: [logs]
      summary: Update a log entry
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLogBody"
      responses:
        "200":
          description: Updated log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Log"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteLog
      tags: [logs]
      summary: Delete a log entry
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Log deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /batches/{batchId}/photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List photos for a batch
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized
    post:
      operationId: createPhoto
      tags: [photos]
      summary: Register a photo after upload (save metadata)
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhotoBody"
      responses:
        "201":
          description: Created photo record with AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Unauthorized

  /batches/{batchId}/photos/{photoId}:
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      security:
        - clerkAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /ai/analyze-photo:
    post:
      operationId: analyzePhoto
      tags: [ai]
      summary: Analyze a SCOBY/batch photo with AI
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzePhotoBody"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzePhotoResponse"
        "401":
          description: Unauthorized

  /ai/onboarding-advice:
    post:
      operationId: getOnboardingAdvice
      tags: [ai]
      summary: Get personalized AI advice after onboarding quiz
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingAdviceBody"
      responses:
        "200":
          description: AI onboarding advice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingAdviceResponse"
        "401":
          description: Unauthorized

  /ai/chat:
    post:
      operationId: chatWithAdvisor
      tags: [ai]
      summary: Chat with the kombucha AI advisor
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: AI chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageResponse"
        "401":
          description: Unauthorized

  /ai/chat/history:
    get:
      operationId: getChatHistory
      tags: [ai]
      summary: Get chat conversation history for the current user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "401":
          description: Unauthorized

  /ai/tts:
    post:
      operationId: textToSpeech
      tags: [ai]
      summary: Convert text to speech audio (base64)
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsBody"
      responses:
        "200":
          description: Audio as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtsResponse"
        "401":
          description: Unauthorized

  /ai/flavoring-guide:
    get:
      operationId: getFlavoringGuide
      tags: [ai]
      summary: Get flavoring suggestions when F1 is complete
      security:
        - clerkAuth: []
      parameters:
        - name: preference
          in: query
          required: false
          schema:
            type: string
            enum: [sweet, sour, fruity]
      responses:
        "200":
          description: Flavoring suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlavoringGuideResponse"
        "401":
          description: Unauthorized

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for photo upload
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "401":
          description: Unauthorized

  /storage/objects/{objectPath}:
    get:
      operationId: getObject
      tags: [storage]
      summary: Serve an uploaded object
      security:
        - clerkAuth: []
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object file
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (active batches, recent logs, stats)
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        hasCompletedOnboarding:
          type: boolean
        hasMadeBefore:
          type: boolean
        hasScoby:
          type: boolean
        currentStage:
          type: string
          nullable: true
        experienceLevel:
          type: string
          nullable: true
        flavorPreference:
          type: string
          nullable: true
        onboardingAdvice:
          type: string
          nullable: true
        ttsEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - hasCompletedOnboarding
        - hasMadeBefore
        - hasScoby
        - ttsEnabled
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        hasCompletedOnboarding:
          type: boolean
        hasMadeBefore:
          type: boolean
        hasScoby:
          type: boolean
        currentStage:
          type: string
        experienceLevel:
          type: string
        flavorPreference:
          type: string
        onboardingAdvice:
          type: string
        ttsEnabled:
          type: boolean

    Batch:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        startedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, f1_complete, f2_complete, archived]
        teaType:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        logCount:
          type: integer
        photoCount:
          type: integer
        daysSinceStart:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - startedAt
        - status
        - logCount
        - photoCount
        - daysSinceStart
        - createdAt
        - updatedAt

    CreateBatchBody:
      type: object
      properties:
        name:
          type: string
        startedAt:
          type: string
          format: date-time
        teaType:
          type: string
        notes:
          type: string
      required:
        - name

    UpdateBatchBody:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, f1_complete, f2_complete, archived]
        teaType:
          type: string
        notes:
          type: string

    Log:
      type: object
      properties:
        id:
          type: integer
        batchId:
          type: integer
        dayNumber:
          type: integer
        temperature:
          type: number
          nullable: true
        scobylook:
          type: string
          nullable: true
        smell:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        aiTip:
          type: string
          nullable: true
        loggedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - batchId
        - dayNumber
        - loggedAt
        - createdAt

    CreateLogBody:
      type: object
      properties:
        dayNumber:
          type: integer
        temperature:
          type: number
        scobylook:
          type: string
        smell:
          type: string
          enum: [good, sour, vinegary, strange]
        color:
          type: string
        notes:
          type: string
        loggedAt:
          type: string
          format: date-time
      required:
        - dayNumber

    UpdateLogBody:
      type: object
      properties:
        dayNumber:
          type: integer
        temperature:
          type: number
        scobylook:
          type: string
        smell:
          type: string
          enum: [good, sour, vinegary, strange]
        color:
          type: string
        notes:
          type: string
        loggedAt:
          type: string
          format: date-time

    Photo:
      type: object
      properties:
        id:
          type: integer
        batchId:
          type: integer
        objectPath:
          type: string
        caption:
          type: string
          nullable: true
        dayNumber:
          type: integer
          nullable: true
        aiAnalysis:
          type: string
          nullable: true
        takenAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - batchId
        - objectPath
        - takenAt
        - createdAt

    CreatePhotoBody:
      type: object
      properties:
        objectPath:
          type: string
        caption:
          type: string
        dayNumber:
          type: integer
        takenAt:
          type: string
          format: date-time
        analyzeWithAi:
          type: boolean
      required:
        - objectPath

    AnalyzePhotoBody:
      type: object
      properties:
        objectPath:
          type: string
      required:
        - objectPath

    AnalyzePhotoResponse:
      type: object
      properties:
        analysis:
          type: string
      required:
        - analysis

    OnboardingAdviceBody:
      type: object
      properties:
        hasMadeBefore:
          type: boolean
        hasScoby:
          type: boolean
        currentStage:
          type: string
        experienceLevel:
          type: string
      required:
        - hasMadeBefore
        - hasScoby

    OnboardingAdviceResponse:
      type: object
      properties:
        advice:
          type: string
      required:
        - advice

    ChatMessageBody:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ChatMessageResponse:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - content
        - createdAt

    TtsBody:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    TtsResponse:
      type: object
      properties:
        audio:
          type: string
          description: Base64 encoded audio (mp3)
        format:
          type: string
      required:
        - audio
        - format

    FlavoringGuideResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              ingredients:
                type: string
              tip:
                type: string
            required:
              - name
              - ingredients
              - tip
        generalTips:
          type: string
      required:
        - suggestions
        - generalTips

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath

    DashboardSummary:
      type: object
      properties:
        activeBatchCount:
          type: integer
        totalBatchCount:
          type: integer
        totalPhotoCount:
          type: integer
        recentLogs:
          type: array
          items:
            $ref: "#/components/schemas/Log"
        activeBatches:
          type: array
          items:
            $ref: "#/components/schemas/Batch"
      required:
        - activeBatchCount
        - totalBatchCount
        - totalPhotoCount
        - recentLogs
        - activeBatches
